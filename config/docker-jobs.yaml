# ==========================================
# Docker Default Jobs Configuration
# ==========================================
#
# This file defines how sn2md processes files inside the container.
# It uses environment variables to point to the internal /data/in and /data/out directories.
#
# ------------------------------------------
# HOW TO CUSTOMIZE
# ------------------------------------------
# To create your own custom job configuration (e.g., to process multiple folders):
# 1. Create a new file locally (e.g., `config/jobs.yaml`).
# 2. Define your jobs there. You can start by copying `config/jobs.docker.example.yaml`.
# 3. Mount it to `/config/jobs.yaml` in your docker-compose file:
#
#    volumes:
#      - ./config/jobs.yaml:/config/jobs.yaml
#
# If `/config/jobs.yaml` is present, the container will automatically use it instead of this file.
# ------------------------------------------

# Docker optimized jobs config
defaults:
  input: ${SN2MD_DEFAULT_INPUT}
  output: ${SN2MD_DEFAULT_OUTPUT}
  config: /app/config/settings.toml
  flags:
    level: INFO
    progress: false  # Less noise in logs

jobs:
  # The 'Default' job inherits everything from 'defaults' above.
  # It processes files from ${SN2MD_DEFAULT_INPUT} (/data/in) -> ${SN2MD_DEFAULT_OUTPUT} (/data/out).
  - name: Default
