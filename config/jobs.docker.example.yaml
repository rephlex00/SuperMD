# Docker Custom Jobs Configuration
# Copy this file to your local ./config directory as 'jobs.yaml' to override the default behavior.

# Global defaults
defaults:
  # 'input' is usually mounted to /data/in
  input: /data/in
  # 'output' is usually mounted to /data/out
  output: /data/out
  # Config file for general settings like prompts and file naming
  config: /config/settings.toml
  flags:
    level: INFO
    progress: false

jobs:
  # Define specific sub-folders or entirely different inputs here if you have complex mounts.
  
  # Example 1: Standard processing (Same as default)
  - name: Default
  
  # Example 2: Separate job for a specific subfolder
  # - name: WorkNotes
  #   input: /data/in/Work
  #   output: /data/out/Work
