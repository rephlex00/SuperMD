services:
  webdav:
    image: ghcr.io/hacdias/webdav:latest
    container_name: sn2md-webdav
    # Run as the specified user to ensure file permissions match sn2md
    user: "${PUID}:${PGID}"
    environment:
      - HOME=/tmp # Writeable home for any temp files
      - TZ=America/New_York
      - WEBDAV_USERNAME=${WEBDAV_USERNAME:-admin}
      - WEBDAV_PASSWORD=${WEBDAV_PASSWORD:-admin}
    volumes:
      - ./config/webdav/config.yml:/config.yml:ro
      - ./data/webdav:/data
    command: --config /config.yml
    ports:
      - 8080:8080
    restart: unless-stopped

  sn2md:
    build: .
    image: sn2md-app
    depends_on:
      - webdav
    volumes:
      - ./data/webdav:/data/in:ro # Mount the shared folder to input (read-only)
      - ./out:/data/out
      - ./config:/config
    environment:
      - SN2MD_DEFAULT_INPUT=/data/in
      - SN2MD_DEFAULT_OUTPUT=/data/out
      - SN2MD_WATCH_DELAY=${SN2MD_WATCH_DELAY:-30.0}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PUID=${PUID:-1001}
      - PGID=${PGID:-1001}

  # Obsidian Service (LinuxServer.io)
  obsidian:
    image: lscr.io/linuxserver/obsidian:latest
    container_name: obsidian
    security_opt:
      - seccomp:unconfined # Required for the app to run correctly
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=America/New_York
    volumes:
      - ./config/obsidian:/config # Stores app settings/login state
      - ./obsidian_vault:/vaults # Output directory for sn2md
    ports:
      - 3001:3001 # Access GUI here to set up Sync initially (HTTPS)
    restart: unless-stopped

volumes:
  webdav_data:
