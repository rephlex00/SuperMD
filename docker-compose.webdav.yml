services:
  webdav:
    image: lscr.io/linuxserver/webdav:latest
    container_name: sn2md-webdav
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/New_York
      # Default user/pass is admin/admin. Change these if needed.
      # - USERNAME=admin
      # - PASSWORD=admin 
    volumes:
      - ./config/webdav:/config
      - webdav_data:/data
    ports:
      - 8080:80
    restart: unless-stopped

  app:
    build: .
    image: sn2md-app
    depends_on:
      - webdav
    volumes:
      - webdav_data:/data/in # Mount the shared volume to input
      - ./out:/data/out
      - ./config:/config
    environment:
      - SN2MD_DEFAULT_INPUT=/data/in
      - SN2MD_DEFAULT_OUTPUT=/data/out
      - OPENAI_MODEL=gpt-4o-mini
      # - OPENAI_API_KEY=your-api-key-here

volumes:
  webdav_data:
