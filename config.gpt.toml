# ===============================
# sn2md configuration file
# Tuned for: gpt-4o-mini
# ===============================

# Use the small, fast, cheap model that works well for SN pages.
model = "gpt-5-mini"

# --------------------------------
# Title Extraction Behavior
# --------------------------------

# Makes highlight-based titles behave predictably.
# Supernote H1 → #, H2 → ##, H3 → ###, H4 → ####
#title_prompt = """
#"""

# --------------------------------
# Output: one folder per note
# --------------------------------

output_filename_template = "{{file_basename}}.md"
output_path_template = "{{year}}/{{month}}"

# --------------------------------
# Page → Markdown Conversion
# --------------------------------

prompt = """
###
Context (the last few lines of markdown from the previous page):
{context}
###
Convert the image to markdown:
- If there is a simple diagram that the mermaid syntax can achieve, create a mermaid codeblock of it.
- If most of the image is a drawing (not written text), add a #drawing tag and describe the drawing in no more than 8 words.
- When it is unclear what an image is, don't output anything for it.
- Use $$, $ latex math blocks for math equations.
- Support Obsidian syntaxes and dataview "field:: value" syntax.
- Do not wrap text in codeblocks.
- Convert any double underlined words to internal wiki links (double brackets) only if you're abundantly sure the word is double underlined.
- Use at most one blank line at a time; never produce consecutive blank lines.
- Preserve the original nesting: match each item’s indentation level from the handwritten list when converting to Markdown, using two spaces per level.
- When transcribing handwritten checklists, map box states explicitly:
  * Empty box (no mark) → '- [ ]'
  * Checked/filled box → '- [x]'
  * Box with a handwritten X (cancelled) → '- [-]'
  Keep the original item text after the checkbox marker.
- For incomplete checklist items (empty boxes), append ' ➕ {{year_month_day}}' immediately after the item text so the note date is captured with each open task.
- When a header appears to be written in all capital letters assume it's a title heading H1 # and capitalize only the first letter of each word.
- The first line should never be a blank line.


If the image contains what appears to be a heading:
- Determine a reasonable heading level based on visual prominence. (##, ###, ####, #####)
"""


# --------------------------------
# Jinja Output Template
# --------------------------------

# A clean, simple markdown output structure.
template = """
---
date: {{year_month_day}}
type: supernote
notefile: {{file_basename}}.note
---
{{llm_output}}

# Images
{% for image in images %}
![{{ image.name }}]({{image.name}})
{%- endfor %}
"""
