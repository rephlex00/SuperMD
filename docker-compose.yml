services:
  app:
    build: .
    image: sn2md-app
    volumes:
      - ./in:/data/in
      - ./out:/data/out
      - ./config:/config
    environment:
      - SN2MD_DEFAULT_INPUT=/data/in
      - SN2MD_DEFAULT_OUTPUT=/data/out
      - OPENAI_MODEL=gpt-4o-mini
      # - OPENAI_API_KEY=your-api-key-here # Uncomment and set if not passed via env file or shell
