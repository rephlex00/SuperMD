# Global defaults used when a job omits a field
defaults:
  input: ~/Projects/sn2md/in
  output: ~/Projects/sn2md/out
  env_file: ~/.env           # optional; sourced if exists
  flags:
    force: false             # sn2md --force
    progress: true           # sn2md --progress / --no-progress
    level: INFO              # sn2md -l INFO|DEBUG|WARNING|ERROR|CRITICAL
    model: gpt-4o-mini       # sn2md -m value
  extra_args: []             # additional args for jobs without a config

jobs:
  - name: Test
    config: ~/Projects/sn2md/tests/test.toml