# =============================================================================
# SuperMD Full Stack: Supernote Cloud → SuperMD → Obsidian Sync
# =============================================================================
#
# Three-service pipeline that automatically converts Supernote handwritten
# notes to Markdown and syncs them to your Obsidian vault.
#
# Quick start:
#   1. docker compose run --rm setup            (interactive first-time config)
#   2. docker compose up -d                     (without Supernote Cloud)
#      docker compose --profile cloud up -d     (with Supernote Cloud sync)
#
# =============================================================================

# ── Secrets ─────────────────────────────────────────────────────────────────
# Sensitive credentials are stored as files in ./secrets/ and mounted
# read-only at /run/secrets/ inside containers.  Never committed to git.
secrets:
  # ── Required ───────────────────────────────────────────────────────────────
  llm_api_key:
    file: ./secrets/llm_api_key            # OpenAI / Gemini / Anthropic key

  obsidian_email:
    file: ./secrets/obsidian_email
  obsidian_password:
    file: ./secrets/obsidian_password

  # ── Optional: leave files empty to disable ────────────────────────────────
  # obsidian_auth_token: bypasses keyring login (leave empty to use email/password)
  obsidian_auth_token:
    file: ./secrets/obsidian_auth_token
  # obsidian_vault_password: E2E encryption password (leave empty for standard encryption)
  obsidian_vault_password:
    file: ./secrets/obsidian_vault_password

  # ── Cloud profile only (--profile cloud) ──────────────────────────────────
  supernote_email:
    file: ./secrets/supernote_email
  supernote_password:
    file: ./secrets/supernote_password
  supernote_token:
    file: ./secrets/supernote_token

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  notes-data:                   # supernote-sync writes → supermd reads
  vault-data:                   # supermd writes → obsidian-sync reads
  obsidian-config:              # persists ob login credentials across restarts
  obsidian-keyring:             # persists gnome-keyring data (manual auth survives restarts)

# ── Services ────────────────────────────────────────────────────────────────
services:

  # ── First-time Setup ────────────────────────────────────────────────────
  # Interactive config wizard.  Run once before starting the stack:
  #   docker compose run --rm setup
  #   docker compose run --rm setup --reset   (clear all secrets and .env)
  setup:
    image: bash:latest
    profiles: ["setup"]
    volumes:
      - .:/stack
    working_dir: /stack
    stdin_open: true
    tty: true
    entrypoint: ["/stack/setup.sh"]

  # ── Supernote Cloud Sync (optional) ─────────────────────────────────────
  # Only starts with: docker compose --profile cloud up
  # Skip this if you mount .note files from a NAS or other sync tool.
  supernote-sync:
    build: ./supernote-sync
    profiles: ["cloud"]
    volumes:
      - notes-data:/notes
    secrets:
      - supernote_email
      - supernote_password
      - supernote_token
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-300}
      - SYNC_PATH=${SYNC_PATH:-/Note}
    restart: unless-stopped

  # ── SuperMD Converter ───────────────────────────────────────────────────
  # Watches /input for .note files, converts to Markdown in /output.
  supermd:
    build:
      context: ../..
      dockerfile: Dockerfile
    volumes:
      - notes-data:/input:ro
      - vault-data:/output
      - ${SUPERMD_CONFIG:-./supermd.stack.yaml}:/config/supermd.yaml:ro
      - ./supermd-entrypoint.sh:/supermd-entrypoint.sh:ro
    secrets:
      - llm_api_key
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
    entrypoint: ["/supermd-entrypoint.sh"]
    command: ["supermd", "--config", "/config/supermd.yaml", "watch"]
    depends_on:
      supernote-sync:
        condition: service_started
        required: false
    restart: unless-stopped

  # ── Configuration GUI (optional) ───────────────────────────────────────
  # Web-based config editor accessible over your network (e.g. Tailscale).
  # Start with: docker compose --profile gui up -d
  # The auth token is printed in the container logs.
  supermd-gui:
    build:
      context: ../..
      dockerfile: Dockerfile
    profiles: ["gui"]
    ports:
      - "${SUPERMD_GUI_PORT:-8734}:8734"
    volumes:
      - ${SUPERMD_CONFIG:-./supermd.stack.yaml}:/config/supermd.yaml
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - SUPERMD_GUI_TOKEN=${SUPERMD_GUI_TOKEN:-}
    command: ["supermd", "--config", "/config/supermd.yaml", "gui", "--host", "0.0.0.0", "--port", "8734"]
    restart: unless-stopped

  # ── Obsidian Headless Sync ─────────────────────────────────────────────
  # Continuously syncs the vault to Obsidian Sync via the official
  # obsidian-headless CLI.  Requires an Obsidian Sync subscription.
  obsidian-sync:
    build: ./obsidian-sync
    volumes:
      - vault-data:/vault
      - obsidian-config:/home/obsidian/.config
      - obsidian-keyring:/home/obsidian/.local/share/keyrings
    secrets:
      - obsidian_email
      - obsidian_password
      - obsidian_auth_token
      - obsidian_vault_password
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - OBSIDIAN_VAULT_NAME=${OBSIDIAN_VAULT_NAME}
    depends_on:
      - supermd
    restart: unless-stopped
