version: '3.8'

services:
  # Database Service
  supernote-mariadb:
    image: mariadb:10.6.24
    container_name: supernote-mariadb
    restart: unless-stopped
    networks:
      - supernote-net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-MysqlrootPassword}
      MYSQL_DATABASE: supernotedb
      MYSQL_USER: ${MYSQL_USER:-supernote}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-supernotedbpassword}
    volumes:
      - ./data/supernote/mysql:/var/lib/mysql
      - ./data/supernote/supernotedb.sql:/docker-entrypoint-initdb.d/supernotedb.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Redis Service
  supernote-redis:
    image: redis:7.4.7
    container_name: supernote-redis
    restart: unless-stopped
    networks:
      - supernote-net
    volumes:
      - ./data/supernote/redis:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-supernoteredispassword} --dir /data --dbfilename dump.rdb

  # Note Conversion Service
  notelib:
    image: supernote/notelib:6.9.3
    container_name: notelib
    restart: unless-stopped
    networks:
      - supernote-net

  # Supernote Private Cloud Service
  supernote-service:
    image: supernote/supernote-service:25.12.17
    container_name: supernote-service
    restart: unless-stopped
    networks:
      - supernote-net
    depends_on:
      - supernote-mariadb
      - supernote-redis
      - notelib
    ports:
      - "${HOST_HTTP_PORT:-19072}:8080" # Web management & Sync
      - "${HOST_HTTPS_PORT:-19443}:443" # HTTPS
      - "18072:18072" # Auto-sync
    volumes:
      - ./data/supernote/recycle:/home/supernote/recycle
      - ./data/files:/home/supernote/data # User data storage
      - ./data/supernote/logs/cloud:/home/supernote/cloud/logs
      - ./data/supernote/logs/app:/home/supernote/logs
      - ./data/supernote/logs/web:/var/log/nginx
      - ./data/supernote/convert:/home/supernote/convert
      - ./data/cert:/etc/nginx/cert
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: supernote-mariadb
      MYSQL_DATABASE: supernotedb
      MYSQL_USER: ${MYSQL_USER:-supernote}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-supernotedbpassword}
      REDIS_HOST: supernote-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-supernoteredispassword}
      DOMAIN_NAME: ${DOMAIN_NAME:-supernote.local}
      SSL_CERT_NAME: ${SSL_CERT_NAME:-server.crt}
      SSL_KEY_NAME: ${SSL_KEY_NAME:-server.key}

  # Obsidian Service (LinuxServer.io)
  obsidian:
    image: lscr.io/linuxserver/obsidian:latest
    container_name: obsidian
    security_opt:
      - seccomp:unconfined # Required for the app to run correctly
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config/obsidian:/config # Stores app settings/login state
      - ./obsidian_vault:/vaults # Output directory for sn2md
    ports:
      - 3000:3000 # Access GUI here to set up Sync initially
    restart: unless-stopped

  # sn2md Service (Integrated)
  sn2md:
    build: .
    image: sn2md-app
    container_name: sn2md
    restart: unless-stopped
    depends_on:
      - supernote-service
      - obsidian
    volumes:
      # Mount the SAME data volume as supernote-service to access synced files
      - ./data/files:/data/in:ro
      - ./obsidian_vault:/data/out # Output to Obsidian valut
      - ./config:/config
    environment:
      - SN2MD_DEFAULT_INPUT=/data/in
      - SN2MD_DEFAULT_OUTPUT=/data/out
      - SN2MD_WATCH_DELAY=${SN2MD_WATCH_DELAY:-30.0}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

networks:
  supernote-net:
    driver: bridge
